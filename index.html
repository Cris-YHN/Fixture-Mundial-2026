<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mundial 2026">
<meta name="theme-color" content="#0a1628">
<title>Mundial 2026 🏆</title>
<style>
:root{
  --gold:#c9a227;--gold2:#f0c040;--green2:#22a05a;
  --radius:12px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --ftr-h:52px
}
/* TEMA OSCURO (default) */
html{
  --navy:#0a1628;--navy2:#12213d;--navy3:#1c2f52;
  --white:#f5f5f0;--muted:#8899aa;
  --border:rgba(255,255,255,0.08);
  --card:rgba(255,255,255,0.05);--card2:rgba(255,255,255,0.09);
  --tbl-row:rgba(255,255,255,0.04);
  --win-bg:rgba(26,106,60,0.2);--win-tx:#5dca9a;
  --inp-bg:#1c2f52;--inp-focus-bg:rgba(201,162,39,0.1);
  --q1-bg:rgba(201,162,39,0.10);--q2-bg:rgba(26,106,60,0.08);
  --champ-bg1:rgba(201,162,39,0.15);--champ-bg2:rgba(201,162,39,0.05)
}
/* TEMA CLARO */
html.light{
  --navy:#f0f4fa;--navy2:#ffffff;--navy3:#e2e8f4;
  --white:#1a2540;--muted:#6b7a95;
  --border:rgba(0,0,0,0.08);
  --card:rgba(0,0,0,0.03);--card2:rgba(0,0,0,0.05);
  --tbl-row:rgba(0,0,0,0.025);
  --win-bg:rgba(26,106,60,0.1);--win-tx:#166534;
  --inp-bg:#e8eef8;--inp-focus-bg:rgba(201,162,39,0.12);
  --q1-bg:rgba(201,162,39,0.12);--q2-bg:rgba(26,106,60,0.09);
  --champ-bg1:rgba(201,162,39,0.12);--champ-bg2:rgba(201,162,39,0.04);
  --gold2:#a07a10
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--navy)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--white);display:flex;flex-direction:column}

/* HEADER */
.hdr{padding:calc(var(--safe-top)+10px) 16px 10px;background:var(--navy2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.htr{font-size:22px}
.htit{font-size:21px;font-weight:800;letter-spacing:1px;line-height:1}
.htit span{color:var(--gold)}
.hsub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.hrgt{margin-left:auto;text-align:right}
.hnum{font-size:19px;font-weight:700;color:var(--gold2);line-height:1}
.hlbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

/* TABS */
.tabs{display:flex;background:var(--navy2);border-bottom:2px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:9px 4px 7px;font-size:11px;font-weight:700;letter-spacing:.4px;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;text-transform:uppercase;transition:color .2s,border-color .2s}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold2)}
.ti{font-size:14px;display:block;margin-bottom:1px}

/* SCROLL */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.main::-webkit-scrollbar{display:none}
.section{display:none;padding:10px 10px calc(var(--safe-bottom) + var(--ftr-h) + 16px)}
.section.active{display:block}

/* GROUP TABLE */
.gcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.ghdr{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:16px;font-weight:800;letter-spacing:1px;border-left-width:4px;border-left-style:solid}
.gltr{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.gtbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.gtbl th{padding:4px 3px;text-align:center;color:var(--muted);font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.gtbl th:first-child{text-align:left;padding-left:10px;width:42%}
.gtbl th:nth-child(2){width:10%}
.gtbl th:nth-child(3){width:13%}
.gtbl th:nth-child(4),.gtbl th:nth-child(5){width:10%}
.gtbl th:nth-child(6){width:15%}
.gtbl td{padding:5px 5px;text-align:center;border-bottom:1px solid var(--tbl-row)}
.gtbl td:first-child{text-align:left;padding-left:8px}
.gtbl tr:last-child td{border-bottom:none}
.gtbl tr.q1 td{background:var(--q1-bg)}
.gtbl tr.q2 td{background:var(--q2-bg)}
.pv{font-size:14px;font-weight:700;color:var(--gold2)}
.qd{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle;flex-shrink:0}
.q1 .qd{background:var(--gold)}.q2 .qd{background:var(--green2)}
.tc{display:flex;align-items:center;gap:4px;font-size:11px}
.em{font-size:13px;line-height:1}

/* FIXTURE POR GRUPO */
.fcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.fghdr{display:flex;align-items:center;gap:8px;padding:9px 13px;font-size:15px;font-weight:800;letter-spacing:1px;border-left-width:4px;border-left-style:solid}
.fgltr{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.fdate-label{padding:5px 12px 3px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);background:rgba(201,162,39,0.06);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.fdate-label:first-of-type{border-top:none}
.mitem{padding:8px 10px;border-bottom:1px solid var(--tbl-row)}
.mitem:last-child{border-bottom:none}
.mmeta{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.mtime{font-size:10px;color:var(--muted);font-weight:600}
.mvenue{font-size:9px;color:var(--muted);margin-left:auto;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mrow{display:flex;align-items:center;gap:6px}
.mteam{flex:1;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mteam.aw{text-align:right}
.sw{display:flex;align-items:center;gap:3px;flex-shrink:0}
.si{width:31px;height:29px;border-radius:6px;text-align:center;font-size:16px;font-weight:700;background:var(--inp-bg);border:1px solid var(--border);color:var(--white);outline:none;-webkit-appearance:none}
.si:focus{border-color:var(--gold);background:var(--inp-focus-bg)}
.si.hs{color:var(--gold2);border-color:rgba(201,162,39,0.3)}
.ssep{color:var(--muted);font-size:14px;font-weight:700}

/* KO */
.plbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);padding:12px 0 5px;border-bottom:1px solid var(--border);margin-bottom:7px}
.kogrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.komatch{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.komatch.fin{border-color:rgba(201,162,39,0.4);background:rgba(201,162,39,0.04)}
.korow{padding:5px 7px;display:flex;align-items:center;gap:5px;border-bottom:1px solid var(--tbl-row);min-height:26px}
.korow:last-child{border-bottom:none}
.korow.win{background:var(--win-bg);color:var(--win-tx)}
.konm{flex:1;font-size:10px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.konm.tbd{color:var(--muted);font-style:italic;font-size:9px}
.koi{width:21px;height:19px;border-radius:4px;text-align:center;font-size:11px;font-weight:700;background:var(--inp-bg);border:1px solid var(--border);color:var(--white);outline:none;-webkit-appearance:none;flex-shrink:0}
.koi:focus{border-color:var(--gold)}
.koi.hs{color:var(--gold2)}

/* STATS BAR */
.sbar{display:flex;gap:6px;margin-bottom:11px}
.sp{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 5px;text-align:center}
.spv{font-size:19px;font-weight:700;color:var(--gold2);line-height:1}
.spl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

/* CHAMPION */
.champbox{margin-top:12px;background:var(--champ-bg1);border:1.5px solid rgba(201,162,39,0.5);border-radius:var(--radius);padding:16px;text-align:center}
.champtr{font-size:34px;display:block;margin-bottom:5px}
.champlbl{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.champnm{font-size:25px;font-weight:800;color:var(--gold2);letter-spacing:1px}
.champfl{font-size:26px;display:block;margin-bottom:2px}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

/* GRP badge colors */
.gc{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* CALENDARIO */
.cal-day{margin-bottom:14px}
.cal-day-hdr{display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--navy2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;position:sticky;top:0;z-index:10}
.cal-day-num{font-size:22px;font-weight:800;color:var(--gold2);line-height:1;min-width:28px}
.cal-day-info{display:flex;flex-direction:column;gap:1px}
.cal-day-name{font-size:12px;font-weight:700;color:var(--white);text-transform:uppercase;letter-spacing:.5px}
.cal-day-month{font-size:10px;color:var(--muted);letter-spacing:.5px}
.cal-day-count{margin-left:auto;font-size:10px;font-weight:700;color:var(--muted);background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:2px 8px;white-space:nowrap}
.cal-match{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;overflow:hidden}
.cal-match-top{display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid var(--tbl-row)}
.cal-grp-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0}
.cal-time{font-size:10px;font-weight:700;color:var(--muted);margin-left:auto;white-space:nowrap}
.cal-venue{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.cal-teams{display:flex;align-items:center;gap:6px;padding:8px 10px}
.cal-team{flex:1;font-size:12px;font-weight:600;color:var(--white);display:flex;align-items:center;gap:5px;overflow:hidden}
.cal-team.away{justify-content:flex-end;flex-direction:row-reverse}
.cal-team .cem{font-size:14px;flex-shrink:0}
.cal-team span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-vs{font-size:11px;font-weight:800;color:var(--muted);flex-shrink:0}
.cal-tbd{color:var(--muted)!important;font-style:italic}
/* PHASE LOCK */
.phase-lock{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 14px;text-align:center;margin-bottom:8px}
.phase-lock-ico{font-size:28px;display:block;margin-bottom:6px}
.phase-lock-ttl{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:4px}
.phase-lock-sub{font-size:11px;color:var(--muted);opacity:.7;line-height:1.4}
.phase-lock-bar{height:6px;background:var(--border);border-radius:3px;margin-top:10px;overflow:hidden}
.phase-lock-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;transition:width .4s}
.phase-lock-prog{font-size:10px;color:var(--muted);margin-top:5px}


/* THEME TOGGLE BTN en header */
.thm-btn{margin-left:auto;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 10px;font-size:13px;cursor:pointer;color:var(--white);display:flex;align-items:center;gap:5px;transition:background .2s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.thm-btn:active{background:var(--navy3)}
.thm-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}

/* FOOTER FIJO */
.ftr{position:fixed;bottom:0;left:0;right:0;background:var(--navy2);border-top:1px solid var(--border);z-index:200;padding-bottom:var(--safe-bottom)}
.ftr-handle{display:flex;align-items:center;justify-content:center;gap:8px;padding:9px 16px 7px;cursor:pointer;user-select:none;-webkit-user-select:none}
.ftr-bar{width:34px;height:3px;background:var(--border);border-radius:2px;transition:background .2s}
.ftr-handle:active .ftr-bar{background:rgba(201,162,39,0.5)}
.ftr-hlbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.ftr-panel{padding:0 12px 10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;overflow:hidden;max-height:0;transition:max-height .3s ease,padding .3s ease;padding-top:0;padding-bottom:0}
.ftr.open .ftr-panel{max-height:100px;padding-bottom:10px}
.ftr-btn{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 9px;text-decoration:none;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent;color:inherit}
.ftr-btn:active{background:var(--card2)}
.ftr-ico{font-size:17px;flex-shrink:0;line-height:1}
.ftr-tx{display:flex;flex-direction:column;gap:1px;min-width:0}
.ftr-ttl{font-size:10px;font-weight:700;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ftr-sub{font-size:8px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ftr-btn.gh{border-color:rgba(201,162,39,0.25);background:rgba(201,162,39,0.07)}
.ftr-btn.gh .ftr-ttl{color:var(--gold2)}
.ftr-btn.fb{border-color:rgba(93,202,154,0.2);background:rgba(93,202,154,0.06)}
.ftr-btn.fb .ftr-ttl{color:#5dca9a}
html.light .ftr-btn.fb .ftr-ttl{color:#166534}
.ftr-credit{text-align:center;font-size:8px;color:var(--muted);opacity:.4;padding:3px 0 5px;letter-spacing:.8px}

/* ── CONVOCADOS ──────────────────────────────────────────────────────────── */
.cv-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.cv-stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 6px;text-align:center}
.cv-stat-n{font-size:18px;font-weight:800;color:var(--gold2);line-height:1}
.cv-stat-l{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;line-height:1.2}
.cv-filters{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.cv-search-wrap{position:relative;margin-bottom:10px}
.cv-search{width:100%;background:var(--inp-bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px 9px 34px;font-size:13px;color:var(--white);outline:none;-webkit-appearance:none}
.cv-search:focus{border-color:var(--gold)}
.cv-search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.cv-filter-btn{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;-webkit-tap-highlight-color:transparent}
.cv-filter-btn.active{background:var(--gold);border-color:var(--gold);color:#000}
.cv-team-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.cv-team-hdr{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.cv-team-hdr:active{background:var(--card2)}
.cv-team-flag{font-size:22px;flex-shrink:0;line-height:1}
.cv-team-info{flex:1;min-width:0}
.cv-team-name{font-size:13px;font-weight:700;color:var(--white)}
.cv-team-sub{font-size:10px;color:var(--muted);margin-top:1px}
.cv-team-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}
.cv-team-arrow{font-size:10px;color:var(--muted);transition:transform .25s;flex-shrink:0}
.cv-team-card.open .cv-team-arrow{transform:rotate(180deg)}
.cv-body{display:none;padding:0 10px 10px}
.cv-team-card.open .cv-body{display:block}
.cv-dt{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--navy2);border-radius:var(--radius-sm);margin-bottom:8px;font-size:11px}
.cv-dt-ico{font-size:16px}
.cv-dt-label{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.5px}
.cv-dt-name{color:var(--white);font-weight:700}
.cv-pos-section{margin-bottom:6px}
.cv-pos-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:4px 0 4px 2px;border-bottom:1px solid var(--border);margin-bottom:4px}
.cv-player{display:flex;align-items:center;padding:5px 2px;border-bottom:1px solid var(--tbl-row)}
.cv-player:last-child{border-bottom:none}
.cv-p-num{font-size:10px;color:var(--muted);min-width:18px;text-align:right;margin-right:8px}
.cv-p-name{flex:1;font-size:12px;font-weight:600;color:var(--white);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cv-p-name.highlight{color:var(--gold2)}
.cv-p-age{font-size:10px;color:var(--muted);margin:0 6px;flex-shrink:0}
.cv-p-club{font-size:10px;color:var(--muted);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;flex-shrink:0}
.cv-empty{text-align:center;padding:30px 10px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<div class="hdr">
  <span class="htr">🏆</span>
  <div>
    <div class="htit">MUNDIAL <span>2026</span></div>
    <div class="hsub">FIFA World Cup</div>
  </div>
  <div class="hrgt" style="display:flex;align-items:center;gap:8px">
    <div style="text-align:right">
      <div class="hnum" id="hpl">0/104</div>
      <div class="hlbl">jugados</div>
    </div>
    <button class="thm-btn" onclick="toggleTheme()" id="thm-btn" aria-label="Cambiar tema">
      <span id="thm-ico">☀️</span>
      <span class="thm-lbl" id="thm-lbl">Claro</span>
    </button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('g')"><span class="ti">⬡</span>Grupos</div>
  <div class="tab" onclick="showTab('c')"><span class="ti">🗓</span>Calendario</div>
  <div class="tab" onclick="showTab('f')"><span class="ti">📅</span>Fixture</div>
  <div class="tab" onclick="showTab('e')"><span class="ti">⚡</span>Eliminat.</div>
  <div class="tab" onclick="showTab('v')"><span class="ti">👕</span>Convocados</div>
</div>

<div class="main">
  <div id="tab-g" class="section active"></div>
  <div id="tab-c" class="section"></div>
  <div id="tab-f" class="section"></div>
  <div id="tab-e" class="section"></div>
  <div id="tab-v" class="section"></div>
</div>

<div class="ftr" id="ftr">
  <div class="ftr-handle" onclick="toggleFooter()" role="button" aria-label="Más opciones">
    <div class="ftr-bar"></div>
    <span class="ftr-hlbl" id="ftr-lbl">más opciones</span>
    <div class="ftr-bar"></div>
  </div>
  <div class="ftr-panel">
    <a class="ftr-btn gh" href="https://github.com/Cris-YHN" target="_blank" rel="noopener">
      <span class="ftr-ico">🐙</span>
      <div class="ftr-tx">
        <span class="ftr-ttl">GitHub</span>
        <span class="ftr-sub">Ver perfil</span>
      </div>
    </a>
    <a class="ftr-btn fb" href="https://forms.gle/1J44ZLuCaTd8D9756" target="_blank" rel="noopener">
      <span class="ftr-ico">✉️</span>
      <div class="ftr-tx">
        <span class="ftr-ttl">Feedback</span>

// Construir lookup de equipos para standings
function buildGM() {
  const gm = {};
  Object.entries(FIXTURE_BY_GROUP).forEach(([grp, ms]) => {
    gm[grp] = ms.map(m => ({id: m[0], t1: m[4], t2: m[5]}));
  });
  return gm;
}
const GM = buildGM();

function save(){ try{localStorage.setItem("mw2026v4", JSON.stringify(S))}catch(e){} }

// Standings
function getStandings(grp) {
  const teams = GRP[grp], st = {};
  teams.forEach(t => st[t] = {pts:0,gf:0,ga:0,gd:0,pj:0});
  GM[grp].forEach(m => {
    const sc = S.g[m.id];
    if(sc && sc.a !== "" && sc.b !== "") {
      const a = +sc.a, b = +sc.b;
      st[m.t1].pj++; st[m.t2].pj++;
      st[m.t1].gf+=a; st[m.t1].ga+=b; st[m.t1].gd+=a-b;
      st[m.t2].gf+=b; st[m.t2].ga+=a; st[m.t2].gd+=b-a;
      if(a>b) st[m.t1].pts+=3;
      else if(b>a) st[m.t2].pts+=3;
      else { st[m.t1].pts++; st[m.t2].pts++; }
    }
  });
  const sorted = [...teams].sort((a,b) =>
    st[b].pts - st[a].pts || st[b].gd - st[a].gd || st[b].gf - st[a].gf
  );
  return {sorted, st};
}
const getQ = g => getStandings(g).sorted;

function countGroupPlayed() {
  return Object.values(S.g).filter(v => v && v.a !== "" && v.b !== "").length;
}
function countKOPlayed() {
  return Object.values(S.k).filter(v => v && v.a !== "" && v.b !== "").length;
}
function updH() {
  const gp = countGroupPlayed();
  const kp = countKOPlayed();

}

      <div class="ghdr" style="border-left-color:${c}">

        <thead><tr><th>Equipo</th><th>PJ</th><th>PTS</th><th>GF</th><th>GC</th><th>DG</th></tr></thead>

      const rc = i===0?"q1":i===1?"q2":"";

    h += `</tbody></table></div>`;

  document.getElementById("tab-g").innerHTML = h;
}

    h += `</div>`;

function mkR16(n) {
  const m1=R32[n*2], m2=R32[n*2+1];
  return {id:"r16_"+n,
    t1:()=>koW(m1.id,m1.t1,m1.t2)||"Por definir",
    t2:()=>koW(m2.id,m2.t1,m2.t2)||"Por definir"};
}
function mkQF(n) {
  const m1=mkR16(n*2), m2=mkR16(n*2+1);
  return {id:"qf_"+n,
    t1:()=>koW(m1.id,m1.t1,m1.t2)||"Por definir",
    t2:()=>koW(m2.id,m2.t1,m2.t2)||"Por definir"};
}
function mkSF(n) {
  const m1=mkQF(n*2), m2=mkQF(n*2+1);
  return {id:"sf_"+n,
    t1:()=>koW(m1.id,m1.t1,m1.t2)||"Por definir",
    t2:()=>koW(m2.id,m2.t1,m2.t2)||"Por definir"};
}

function koH(id, t1, t2, fin) {
  const sc = S.k[id] || {a:"",b:""};
  const a=sc.a!==""?+sc.a:null, b=sc.b!==""?+sc.b:null;
  const w1=a!==null&&b!==null&&a>b, w2=a!==null&&b!==null&&b>a;
  const ha=sc.a!==""?" hs":"", hb=sc.b!==""?" hs":"";
  const tbd1=!FL[t1], tbd2=!FL[t2];
  return `<div class="komatch${fin?" fin":""}">
    <div class="korow${w1?" win":""}">
      <span class="konm${tbd1?" tbd":""}">${tbd1?t1:f(t1)+" "+t1}</span>
      <input class="koi${ha}" type="number" min="0" max="99" value="${sc.a}" placeholder="–"
        oninput="setK('${id}','a',this.value,this)">
    </div>
    <div class="korow${w2?" win":""}">
      <span class="konm${tbd2?" tbd":""}">${tbd2?t2:f(t2)+" "+t2}</span>
      <input class="koi${hb}" type="number" min="0" max="99" value="${sc.b}" placeholder="–"
        oninput="setK('${id}','b',this.value,this)">
    </div>
  </div>`;
}

function setK(id, side, val, el) {
  if(!S.k[id]) S.k[id]={a:"",b:""};
  S.k[id][side]=val;
  save(); renderElim();
  el.classList.toggle("hs", val!=="");
}

function getBestThirds() {
  // Get the 3rd place team and their stats from each group
  const thirds = [];
  Object.keys(GRP).forEach(g => {
    const {sorted, st} = getStandings(g);
    const t = sorted[2]; // 3rd place team
    if(t && st[t].pj === 3) { // only if all matches played
      thirds.push({team: t, grp: g, pts: st[t].pts, gd: st[t].gd, gf: st[t].gf});
    }
  });
  // Sort: pts desc, gd desc, gf desc
  thirds.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
  return thirds; // top 8 qualify
}

  } else {
    h += '<div class="kogrid">';
    for(var i=0; i<8; i++) {
      var m1 = r32M[i*2], m2 = r32M[i*2+1];
      var n1 = koW(m1.id, m1.t1, m1.t2) || ('Gan.16avo '+(i*2+1));
      var n2 = koW(m2.id, m2.t1, m2.t2) || ('Gan.16avo '+(i*2+2));
      h += koH('r16_'+i, n1, n2, false);
    }
    h += '</div>';
  }

  // Cuartos
  h += '<div class="plbl">Cuartos de Final</div>';
  if(r16p < 8) {
    h += phaseLock("🔒", "Fase bloqueada", "Completa los 8 Octavos para desbloquear los Cuartos.", r16p, 8);
  } else {
    h += '<div class="kogrid">';
    for(var i=0; i<4; i++) {
      var r16a = 'r16_'+(i*2), r16b = 'r16_'+(i*2+1);
      var n1 = S.k[r16a] ? (koW(r16a,function(){return'';},function(){return'';}) || ('Gan.Octavo '+(i*2+1))) : ('Gan.Octavo '+(i*2+1));
      var n2 = S.k[r16b] ? (koW(r16b,function(){return'';},function(){return'';}) || ('Gan.Octavo '+(i*2+2))) : ('Gan.Octavo '+(i*2+2));
      h += koH('qf_'+i, n1, n2, false);
    }
    h += '</div>';
  }

  // Semifinales
  h += '<div class="plbl">Semifinales</div>';
  if(qfp < 4) {
    h += phaseLock("🔒", "Fase bloqueada", "Completa los 4 Cuartos para desbloquear las Semifinales.", qfp, 4);
  } else {
    var sn = [0,1,2,3].map(function(i){
      var sc = S.k['qf_'+i];
      if(!sc || sc.a==='' || sc.b==='') return 'Gan.Cuarto '+(i+1);
      var a=+sc.a, b=+sc.b;
      // We need the team names stored from r16 resolution — use placeholder
      return 'Gan.Cuarto '+(i+1);
    });
    h += '<div class="kogrid">';
    h += koH('sf_0', sn[0], sn[1], false);
    h += koH('sf_1', sn[2], sn[3], false);
    h += '</div>';

    if(sfp < 2) {
      h += '<div class="plbl">3er Puesto</div>'
        + phaseLock("🔒","Fase bloqueada","Completa las 2 Semifinales para desbloquear el 3er Puesto.",sfp,2);
      h += '<div class="plbl">Gran Final</div>'
        + phaseLock("🔒","Fase bloqueada","Completa las 2 Semifinales para desbloquear la Final.",sfp,2);
    } else {
      var wSF0 = (S.k['sf_0']&&S.k['sf_0'].a!==''&&S.k['sf_0'].b!=='') ? ((+S.k['sf_0'].a>+S.k['sf_0'].b)?'Gan.Semi 1':'Perd.Semi 1') : null;
      var wSF1 = (S.k['sf_1']&&S.k['sf_1'].a!==''&&S.k['sf_1'].b!=='') ? ((+S.k['sf_1'].a>+S.k['sf_1'].b)?'Gan.Semi 2':'Perd.Semi 2') : null;
      h += '<div class="plbl">3er Puesto — 19 Jul, Miami</div>';
      h += koH('3rd', 'Perd. Semi 1', 'Perd. Semi 2', false);
      h += '<div class="plbl">Gran Final — 19 Jul, MetLife NJ</div>';
      h += koH('final', 'Gan. Semi 1', 'Gan. Semi 2', true);

      var finalSc = S.k['final'];
      if(finalSc && finalSc.a!=='' && finalSc.b!=='') {
        var ch = +finalSc.a > +finalSc.b ? 'Gan. Semi 1' : 'Gan. Semi 2';
        h += '<div class="champbox">'
          + '<span class="champtr">🏆</span>'
          + '<div class="champlbl">Campeon Mundial 2026</div>'
          + '<div class="champnm">'+ch+'</div>'
          + '</div>';
      }
    }
  }

  document.getElementById("tab-e").innerHTML = h;
}

// ── CONVOCADOS ────────────────────────────────────────────────────────────────
var cvState = { grp: 'ALL', q: '', open: null };

var POS_LABEL = { gk: 'Arqueros', def: 'Defensores', mid: 'Mediocampistas', fwd: 'Delanteros' };
var POS_ICO   = { gk: '🧤', def: '🛡️', mid: '⚙️', fwd: '⚽' };

function cvStats() {
  var total = 0, ages = [], pos = {gk:0, def:0, mid:0, fwd:0};
  Object.values(SQUADS).forEach(function(sq) {
    ['gk','def','mid','fwd'].forEach(function(p) {
      (sq[p]||[]).forEach(function(pl) {
        total++; ages.push(pl.age); pos[p]++;
      });
    });
  });
  var avg = ages.length ? (ages.reduce(function(a,b){return a+b;},0)/ages.length).toFixed(1) : '-';
  return { total: total, teams: Object.keys(SQUADS).length, avg: avg, pos: pos };
}

function cvGetTeams() {
  var q = cvState.q.toLowerCase().trim();
  var grp = cvState.grp;

  // Armar lista: [teamName, groupKey]
  var allTeams = [];
  Object.entries(GROUPS).forEach(function(entry) {
    var gKey = entry[0], gData = entry[1];
    gData.teams.forEach(function(team) {
      allTeams.push({ team: team, grp: gKey });
    });
  });

  // Filtrar por grupo
  if(grp !== 'ALL') {
    allTeams = allTeams.filter(function(t){ return t.grp === grp; });
  }

  // Filtrar por búsqueda — en nombre de equipo O nombre de jugador
  if(q) {
    allTeams = allTeams.filter(function(t) {
      if(t.team.toLowerCase().indexOf(q) !== -1) return true;
      var sq = SQUADS[t.team];
      if(!sq) return false;
      return ['gk','def','mid','fwd'].some(function(p) {
        return (sq[p]||[]).some(function(pl) {
          return pl.name.toLowerCase().indexOf(q) !== -1;
        });
      });
    });
  }
  return allTeams;
}

function renderConvocados() {
  var st = cvStats();
  var teams = cvGetTeams();
  var q = cvState.q.toLowerCase().trim();

  var h = '';

  // Estadísticas globales
  h += '<div class="cv-stats">'
    + '<div class="cv-stat"><div class="cv-stat-n">'+st.teams+'</div><div class="cv-stat-l">Selecciones</div></div>'
    + '<div class="cv-stat"><div class="cv-stat-n">'+st.total+'</div><div class="cv-stat-l">Jugadores</div></div>'
    + '<div class="cv-stat"><div class="cv-stat-n">'+st.avg+'</div><div class="cv-stat-l">Edad prom.</div></div>'
    + '<div class="cv-stat"><div class="cv-stat-n">'+st.pos.fwd+'</div><div class="cv-stat-l">Delanteros</div></div>'
    + '</div>';

  // Buscador
  h += '<div class="cv-search-wrap">'
    + '<span class="cv-search-ico">🔍</span>'
    + '<input class="cv-search" type="search" placeholder="Buscar jugador o selección..." '
    + 'value="'+cvState.q.replace(/"/g,'&quot;')+'" '
    + 'oninput="cvSearch(this.value)" />'
    + '</div>';

  // Filtros por grupo
  h += '<div class="cv-filters">';
  h += '<button class="cv-filter-btn'+(cvState.grp==='ALL'?' active':'')+'" onclick="cvFilter(\'ALL\')">Todos</button>';
  'ABCDEFGHIJKL'.split('').forEach(function(g) {
    h += '<button class="cv-filter-btn'+(cvState.grp===g?' active':'')+'" onclick="cvFilter(\''+g+'\')">Grupo '+g+'</button>';
  });
  h += '</div>';

  if(teams.length === 0) {
    h += '<div class="cv-empty">😕 Sin resultados para "'+cvState.q+'"</div>';
  }

  // Tarjetas por equipo
  teams.forEach(function(t) {
    var team = t.team;
    var grpKey = t.grp;
    var sq = SQUADS[team] || null;
    var flag = FLAGS[team] || '🏳️';
    var grpColor = GC[grpKey] || '#888';
    var isOpen = cvState.open === team;
    var playerCount = sq ? ['gk','def','mid','fwd'].reduce(function(a,p){ return a+(sq[p]||[]).length; },0) : 0;

    h += '<div class="cv-team-card'+(isOpen?' open':'')+'" id="cvt-'+team.replace(/[^a-zA-Z]/g,'_')+'">'
      + '<div class="cv-team-hdr" onclick="cvToggle(\''+team.replace(/'/g,"\\'")+'\')">'
      + '<span class="cv-team-flag">'+flag+'</span>'
      + '<div class="cv-team-info">'
      + '<div class="cv-team-name">'+team+'</div>'
      + '<div class="cv-team-sub">'+(sq ? sq.dt+' · '+playerCount+' jugadores' : 'Sin datos')+'</div>'
      + '</div>'
      + '<span class="cv-team-badge" style="background:'+grpColor+'22;color:'+grpColor+';border:1px solid '+grpColor+'44">Grupo '+grpKey+'</span>'
      + '<span class="cv-team-arrow">▼</span>'
      + '</div>';

    if(isOpen && sq) {
      h += '<div class="cv-body">';

      // DT
      h += '<div class="cv-dt">'
        + '<span class="cv-dt-ico">🧑‍💼</span>'
        + '<div><div class="cv-dt-label">Director Técnico</div><div class="cv-dt-name">'+sq.dt+'</div></div>'
        + '</div>';

      // Posiciones
      ['gk','def','mid','fwd'].forEach(function(pos) {
        var players = sq[pos] || [];
        if(!players.length) return;

        // Si hay búsqueda activa, filtrar jugadores
        var show = players;
        if(q) {
          show = players.filter(function(pl){ return pl.name.toLowerCase().indexOf(q) !== -1; });
          if(!show.length) return;
        }

        h += '<div class="cv-pos-section">'
          + '<div class="cv-pos-label">'+POS_ICO[pos]+' '+POS_LABEL[pos]+'</div>';

        show.forEach(function(pl, i) {
          var isHL = q && pl.name.toLowerCase().indexOf(q) !== -1;
          h += '<div class="cv-player">'
            + '<span class="cv-p-num">'+(i+1)+'</span>'
            + '<span class="cv-p-name'+(isHL?' highlight':'')+'" title="'+pl.name+'">'+pl.name+'</span>'
            + '<span class="cv-p-age">'+pl.age+' a</span>'
            + '<span class="cv-p-club" title="'+pl.club+'">'+pl.club+'</span>'
            + '</div>';
        });
        h += '</div>';
      });
      h += '</div>'; // cv-body
    }

    h += '</div>'; // cv-team-card
  });

  document.getElementById('tab-v').innerHTML = h;
}

function cvToggle(team) {
  cvState.open = (cvState.open === team) ? null : team;
  renderConvocados();
  // Scroll al card abierto
  if(cvState.open) {
    setTimeout(function() {
      var id = 'cvt-' + team.replace(/[^a-zA-Z]/g,'_');
      var el = document.getElementById(id);
      if(el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
    }, 50);
  }
}

function cvSearch(val) {
  cvState.q = val;
  cvState.open = null;
  // Si hay búsqueda, abrir automáticamente el primero con resultado
  if(val.trim()) {
    var teams = cvGetTeams();
    if(teams.length === 1) cvState.open = teams[0].team;
  }
  renderConvocados();
}

function cvFilter(grp) {
  cvState.grp = grp;
  cvState.open = null;
  renderConvocados();
}

// INIT
renderGroups();
renderCalendar();
renderFixture();
renderElim();
renderConvocados();
updH();
</script>
