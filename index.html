<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mundial 2026">

<title>Mundial 2026 рҹҸҶ</title>
<style>
:root{
  --gold:#c9a227;--gold2:#f0c040;--green2:#22a05a;
  --radius:12px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --ftr-h:52px
}
/* TEMA OSCURO (default) */
html{
  --navy:#0a1628;--navy2:#12213d;--navy3:#1c2f52;
  --white:#f5f5f0;--muted:#8899aa;
  --border:rgba(255,255,255,0.08);
  --card:rgba(255,255,255,0.05);--card2:rgba(255,255,255,0.09);
  --tbl-row:rgba(255,255,255,0.04);
  --win-bg:rgba(26,106,60,0.2);--win-tx:#5dca9a;
  --inp-bg:#1c2f52;--inp-focus-bg:rgba(201,162,39,0.1);
  --q1-bg:rgba(201,162,39,0.10);--q2-bg:rgba(26,106,60,0.08);
  --champ-bg1:rgba(201,162,39,0.15);--champ-bg2:rgba(201,162,39,0.05)
}
/* TEMA CLARO */
html.light{
  --navy:#f0f4fa;--navy2:#ffffff;--navy3:#e2e8f4;
  --white:#1a2540;--muted:#6b7a95;
  --border:rgba(0,0,0,0.08);
  --card:rgba(0,0,0,0.03);--card2:rgba(0,0,0,0.05);
  --tbl-row:rgba(0,0,0,0.025);
  --win-bg:rgba(26,106,60,0.1);--win-tx:#166534;
  --inp-bg:#e8eef8;--inp-focus-bg:rgba(201,162,39,0.12);
  --q1-bg:rgba(201,162,39,0.12);--q2-bg:rgba(26,106,60,0.09);
  --champ-bg1:rgba(201,162,39,0.12);--champ-bg2:rgba(201,162,39,0.04);
  --gold2:#a07a10
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--navy)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--white);display:flex;flex-direction:column}

/* HEADER */
.hdr{padding:calc(var(--safe-top)+10px) 16px 10px;background:var(--navy2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.htr{font-size:22px}
.htit{font-size:21px;font-weight:800;letter-spacing:1px;line-height:1}
.htit span{color:var(--gold)}
.hsub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.hrgt{margin-left:auto;text-align:right}
.hnum{font-size:19px;font-weight:700;color:var(--gold2);line-height:1}
.hlbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

/* TABS */
.tabs{display:flex;background:var(--navy2);border-bottom:2px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:9px 4px 7px;font-size:11px;font-weight:700;letter-spacing:.4px;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;text-transform:uppercase;transition:color .2s,border-color .2s}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold2)}
.ti{font-size:14px;display:block;margin-bottom:1px}

/* SCROLL */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.main::-webkit-scrollbar{display:none}
.section{display:none;padding:10px 10px calc(var(--safe-bottom) + var(--ftr-h) + 16px)}
.section.active{display:block}

/* GROUP TABLE */
.gcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.ghdr{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:16px;font-weight:800;letter-spacing:1px;border-left-width:4px;border-left-style:solid}
.gltr{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.gtbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.gtbl th{padding:4px 3px;text-align:center;color:var(--muted);font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.gtbl th:first-child{text-align:left;padding-left:10px;width:42%}
.gtbl th:nth-child(2){width:10%}
.gtbl th:nth-child(3){width:13%}
.gtbl th:nth-child(4),.gtbl th:nth-child(5){width:10%}
.gtbl th:nth-child(6){width:15%}
.gtbl td{padding:5px 5px;text-align:center;border-bottom:1px solid var(--tbl-row)}
.gtbl td:first-child{text-align:left;padding-left:8px}
.gtbl tr:last-child td{border-bottom:none}
.gtbl tr.q1 td{background:var(--q1-bg)}
.gtbl tr.q2 td{background:var(--q2-bg)}
.pv{font-size:14px;font-weight:700;color:var(--gold2)}
.qd{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle;flex-shrink:0}
.q1 .qd{background:var(--gold)}.q2 .qd{background:var(--green2)}
.tc{display:flex;align-items:center;gap:4px;font-size:11px}
.em{font-size:13px;line-height:1}

/* FIXTURE POR GRUPO */
.fcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.fghdr{display:flex;align-items:center;gap:8px;padding:9px 13px;font-size:15px;font-weight:800;letter-spacing:1px;border-left-width:4px;border-left-style:solid}
.fgltr{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.fdate-label{padding:5px 12px 3px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);background:rgba(201,162,39,0.06);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.fdate-label:first-of-type{border-top:none}
.mitem{padding:8px 10px;border-bottom:1px solid var(--tbl-row)}
.mitem:last-child{border-bottom:none}
.mmeta{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.mtime{font-size:10px;color:var(--muted);font-weight:600}
.mvenue{font-size:9px;color:var(--muted);margin-left:auto;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mrow{display:flex;align-items:center;gap:6px}
.mteam{flex:1;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mteam.aw{text-align:right}
.sw{display:flex;align-items:center;gap:3px;flex-shrink:0}
.si{width:31px;height:29px;border-radius:6px;text-align:center;font-size:16px;font-weight:700;background:var(--inp-bg);border:1px solid var(--border);color:var(--white);outline:none;-webkit-appearance:none}
.si:focus{border-color:var(--gold);background:var(--inp-focus-bg)}
.si.hs{color:var(--gold2);border-color:rgba(201,162,39,0.3)}
.ssep{color:var(--muted);font-size:14px;font-weight:700}

/* KO */
.plbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);padding:12px 0 5px;border-bottom:1px solid var(--border);margin-bottom:7px}
.kogrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.komatch{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.komatch.fin{border-color:rgba(201,162,39,0.4);background:rgba(201,162,39,0.04)}
.korow{padding:5px 7px;display:flex;align-items:center;gap:5px;border-bottom:1px solid var(--tbl-row);min-height:26px}
.korow:last-child{border-bottom:none}
.korow.win{background:var(--win-bg);color:var(--win-tx)}
.konm{flex:1;font-size:10px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.konm.tbd{color:var(--muted);font-style:italic;font-size:9px}
.koi{width:21px;height:19px;border-radius:4px;text-align:center;font-size:11px;font-weight:700;background:var(--inp-bg);border:1px solid var(--border);color:var(--white);outline:none;-webkit-appearance:none;flex-shrink:0}
.koi:focus{border-color:var(--gold)}
.koi.hs{color:var(--gold2)}

/* STATS BAR */
.sbar{display:flex;gap:6px;margin-bottom:11px}
.sp{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 5px;text-align:center}
.spv{font-size:19px;font-weight:700;color:var(--gold2);line-height:1}
.spl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

/* CHAMPION */
.champbox{margin-top:12px;background:var(--champ-bg1);border:1.5px solid rgba(201,162,39,0.5);border-radius:var(--radius);padding:16px;text-align:center}
.champtr{font-size:34px;display:block;margin-bottom:5px}
.champlbl{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.champnm{font-size:25px;font-weight:800;color:var(--gold2);letter-spacing:1px}
.champfl{font-size:26px;display:block;margin-bottom:2px}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

/* GRP badge colors */
.gc{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* THEME TOGGLE BTN en header */
.thm-btn{margin-left:auto;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 10px;font-size:13px;cursor:pointer;color:var(--white);display:flex;align-items:center;gap:5px;transition:background .2s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.thm-btn:active{background:var(--navy3)}
.thm-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}

/* FOOTER FIJO */
.ftr{position:fixed;bottom:0;left:0;right:0;background:var(--navy2);border-top:1px solid var(--border);z-index:200;padding-bottom:var(--safe-bottom)}
.ftr-handle{display:flex;align-items:center;justify-content:center;gap:8px;padding:9px 16px 7px;cursor:pointer;user-select:none;-webkit-user-select:none}
.ftr-bar{width:34px;height:3px;background:var(--border);border-radius:2px;transition:background .2s}
.ftr-handle:active .ftr-bar{background:rgba(201,162,39,0.5)}
.ftr-hlbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.ftr-panel{padding:0 12px 10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;overflow:hidden;max-height:0;transition:max-height .3s ease,padding .3s ease;padding-top:0;padding-bottom:0}
.ftr.open .ftr-panel{max-height:100px;padding-bottom:10px}
.ftr-btn{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 9px;text-decoration:none;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent;color:inherit}
.ftr-btn:active{background:var(--card2)}
.ftr-ico{font-size:17px;flex-shrink:0;line-height:1}
.ftr-tx{display:flex;flex-direction:column;gap:1px;min-width:0}
.ftr-ttl{font-size:10px;font-weight:700;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ftr-sub{font-size:8px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ftr-btn.gh{border-color:rgba(201,162,39,0.25);background:rgba(201,162,39,0.07)}
.ftr-btn.gh .ftr-ttl{color:var(--gold2)}
.ftr-btn.fb{border-color:rgba(93,202,154,0.2);background:rgba(93,202,154,0.06)}
.ftr-btn.fb .ftr-ttl{color:#5dca9a}
html.light .ftr-btn.fb .ftr-ttl{color:#166534}
.ftr-credit{text-align:center;font-size:8px;color:var(--muted);opacity:.4;padding:3px 0 5px;letter-spacing:.8px}
</style>
</head>

// Construir lookup de equipos para standings
function buildGM() {
  const gm = {};
  Object.entries(FIXTURE_BY_GROUP).forEach(([grp, ms]) => {
    gm[grp] = ms.map(m => ({id: m[0], t1: m[4], t2: m[5]}));
  });
  return gm;
}

function save(){ try{localStorage.setItem("mw2026v4", JSON.stringify(S))}catch(e){} }

// Standings
function getStandings(grp) {
  const teams = GRP[grp], st = {};
  teams.forEach(t => st[t] = {pts:0,gf:0,ga:0,gd:0,pj:0});
  GM[grp].forEach(m => {
    const sc = S.g[m.id];
    if(sc && sc.a !== "" && sc.b !== "") {
      const a = +sc.a, b = +sc.b;
      st[m.t1].pj++; st[m.t2].pj++;
      st[m.t1].gf+=a; st[m.t1].ga+=b; st[m.t1].gd+=a-b;
      st[m.t2].gf+=b; st[m.t2].ga+=a; st[m.t2].gd+=b-a;
      if(a>b) st[m.t1].pts+=3;
      else if(b>a) st[m.t2].pts+=3;
      else { st[m.t1].pts++; st[m.t2].pts++; }
    }
  });
  const sorted = [...teams].sort((a,b) =>
    st[b].pts - st[a].pts || st[b].gd - st[a].gd || st[b].gf - st[a].gf
  );
  return {sorted, st};
}
const getQ = g => getStandings(g).sorted;

function countGroupPlayed() {
  return Object.values(S.g).filter(v => v && v.a !== "" && v.b !== "").length;
}
function countKOPlayed() {
  return Object.values(S.k).filter(v => v && v.a !== "" && v.b !== "").length;
}
function updH() {
  const gp = countGroupPlayed();

}

  const sc = S.k[id];
  if(!sc || sc.a==="" || sc.b==="") return null;

function mkR16(n) {

  const m1=mkR16(n*2), m2=mkR16(n*2+1);

  const m1=mkQF(n*2), m2=mkQF(n*2+1);

function getBestThirds() {
  // Get the 3rd place team and their stats from each group
  const thirds = [];
  Object.keys(GRP).forEach(g => {
    const {sorted, st} = getStandings(g);
    const t = sorted[2]; // 3rd place team
    if(t && st[t].pj === 3) { // only if all matches played
      thirds.push({team: t, grp: g, pts: st[t].pts, gd: st[t].gd, gf: st[t].gf});
    }
  });
  // Sort: pts desc, gd desc, gf desc
  thirds.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
  return thirds; // top 8 qualify
}

    h += `</tbody></table></div>`;

  // Helper: get nth best third by slot label (e.g. "ABCDF")
  function getBestThirdFromGroups(groups) {
    const candidates = qualifiedThirds.filter(t => groups.includes(t.grp));
    // Return top candidate not yet assigned вҖ” simplified: return first match
    return candidates.length ? candidates[0].team : "Mejor 3В° " + groups;

  // Build R32 with real thirds slotted in
  const r32Matches = [
    {id:"r32_1",  t1:()=>getQ("A")[1],                    t2:()=>getQ("B")[1]},
    {id:"r32_2",  t1:()=>getQ("E")[0],                    t2:()=>getBestThirdFromGroups("ABCDF")},

    {id:"r32_4",  t1:()=>getQ("F")[0],                    t2:()=>getQ("C")[1]},
    {id:"r32_5",  t1:()=>getQ("I")[0],                    t2:()=>getBestThirdFromGroups("CDFGH")},
    {id:"r32_6",  t1:()=>getQ("E")[1],                    t2:()=>getQ("I")[1]},
    {id:"r32_7",  t1:()=>getQ("A")[0],                    t2:()=>getBestThirdFromGroups("CEFHI")},
    {id:"r32_8",  t1:()=>getQ("L")[0],                    t2:()=>getBestThirdFromGroups("EHIJK")},
    {id:"r32_9",  t1:()=>getQ("G")[0],                    t2:()=>getBestThirdFromGroups("AEHIJ")},
    {id:"r32_10", t1:()=>getQ("D")[0],                    t2:()=>getBestThirdFromGroups("BEFIJ")},
    {id:"r32_11", t1:()=>getQ("H")[0],                    t2:()=>getQ("J")[1]},
    {id:"r32_12", t1:()=>getQ("K")[1],                    t2:()=>getQ("L")[1]},
    {id:"r32_13", t1:()=>getQ("B")[0],                    t2:()=>getBestThirdFromGroups("EFGIJ")},
    {id:"r32_14", t1:()=>getQ("D")[1],                    t2:()=>getQ("G")[1]},
    {id:"r32_15", t1:()=>getQ("J")[0],                    t2:()=>getQ("H")[1]},
    {id:"r32_16", t1:()=>getQ("K")[0],                    t2:()=>getBestThirdFromGroups("DEIJL")},
  ];

  // 16avos de Final
  h += `<div class="plbl">вҡЎ 16avos de Final</div><div class="kogrid">`;
  r32Matches.forEach(m => h += koH(m.id, m.t1(), m.t2(), false));
  h += `</div>`;

  // Octavos de Final
  h += `<div class="plbl">рҹ”Ҙ Octavos de Final</div><div class="kogrid">`;
  for(let i=0;i<8;i++){const m=mkR16(i);h+=koH(m.id,m.t1(),m.t2(),false);}
  h += `</div>`;

  // Cuartos de Final
  h += `<div class="plbl">вҡ”пёҸ Cuartos de Final</div><div class="kogrid">`;
  for(let i=0;i<4;i++){const m=mkQF(i);h+=koH(m.id,m.t1(),m.t2(),false);}
  h += `</div>`;

  // Semifinales
  const sf0=mkSF(0), sf1=mkSF(1);
  h += `<div class="plbl">рҹҺҜ Semifinales</div><div class="kogrid">`;
  [sf0,sf1].forEach(m=>h+=koH(m.id,m.t1(),m.t2(),false));
  h += `</div>`;

  // 3er puesto
  const l1=()=>{const w=koW(sf0.id,sf0.t1,sf0.t2);if(!w)return"Por definir";const a=sf0.t1(),b=sf0.t2();return a===w?b:a;};
  const l2=()=>{const w=koW(sf1.id,sf1.t1,sf1.t2);if(!w)return"Por definir";const a=sf1.t1(),b=sf1.t2();return a===w?b:a;};
  h += `<div class="plbl">рҹҘү Tercer Puesto</div>`;
  h += koH("3rd", l1(), l2(), false);

  // Final
  const ft1=()=>koW(sf0.id,sf0.t1,sf0.t2)||"Por definir";
  const ft2=()=>koW(sf1.id,sf1.t1,sf1.t2)||"Por definir";
  h += `<div class="plbl">рҹҸҶ Gran Final вҖ” 19 Jul, MetLife NJ</div>`;
  h += koH("final", ft1(), ft2(), true);

  const ch = koW("final", ft1, ft2);
  if(ch) h += `<div class="champbox">
    <span class="champtr">рҹҸҶ</span>
    <div class="champlbl">CampeГіn Mundial 2026</div>
    <span class="champfl">${f(ch)}</span>
    <div class="champnm">${ch.toUpperCase()}</div>
  </div>`;

  document.getElementById("tab-e").innerHTML = h;
}

function showTab(id) {
  document.querySelectorAll(".tab").forEach((t,i) =>
    t.classList.toggle("active", ["g","f","e"][i]===id));
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById("tab-"+id).classList.add("active");
}

function shareApp() {
  const url = window.location.href;
  const txt = 'вҡҪ SeguГӯ el Mundial 2026 con este fixture interactivo!';
  if (navigator.share) {
    navigator.share({ title: 'Mundial 2026 Fixture', text: txt, url });
  } else {
    navigator.clipboard.writeText(url).then(() => alert('вң… Link copiado al portapapeles'));
  }
}

function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  document.getElementById('thm-ico').textContent = isLight ? 'рҹҢҷ' : 'вҳҖпёҸ';
  document.getElementById('thm-lbl').textContent = isLight ? 'Oscuro' : 'Claro';
  document.querySelector('meta[name=theme-color]').content = isLight ? '#ffffff' : '#0a1628';
  try { localStorage.setItem('mw2026theme', isLight ? 'light' : 'dark'); } catch(e){}
}
